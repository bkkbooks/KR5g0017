body:
  text: 太上正一上仙百鬼召籙品第七氣應四月節其日在昴鎮秦中治冬至後一百三十五日立夏太上正一九州社令籙品第八氣應四月中其日在畢鎮真多治冬至後一百五十日小滿太上正一上仙百鬼召籙品第七鎮秦中治左領神氣祭酒屬水在漢州德陽縣應昂宿立夏四月節某法籙弟子某乙命屬北斗某星君素被無下九老北中狄君召某乙謹齎香信詣某法師門下求受太上正一上仙官百鬼召籙受佩之後應有召問立至不得妄有干犯急急如律令仙靈官直使功曹十二人仙靈官正一功曹十二人仙靈官左玄功曹十二人仙靈官右玄功曹十二人仙靈官治病功曹十二人仙靈官左官使者十二人仙靈官右官使者十二人仙靈官左依使者十二人仙靈官右依使者十二人仙靈官左陽神決吏十二人仙靈官右陽神決吏十二人仙靈官左隂神決吏十二人仙靈官右隂神決吏十二人仙靈官左天使者十二人仙靈官右天使者十二人仙靈官左天醫吏十二人仙靈官右天醫吏十二人仙靈官左上玄使者十二人仙靈官右上玄使者十二人仙靈官左承氣使者十二人仙靈官右承氣使者十二人仙靈官左都使者十二人仙靈官右都使者十二人仙靈官左收氣使者十二人仙靈官右收氣使者十二人仙靈官左扶身吏十二人仙靈官右扶身吏十二人仙靈官左收氣直符吏十二人仙靈官右收氣直符吏十二人仙靈官左收邪食邪吏十二人仙靈官右收邪食邪吏十二人仙靈官曆旗將軍十二人仙靈官左曆旗將軍十二人仙靈官右曆旗將軍十二人仙靈官天曆旗將軍十二人仙靈官左天曆旗將軍十二人仙靈官右天曆旗將軍十二人仙靈官左加元曆旗將軍十二人仙靈官右加元曆旗將軍十二人仙靈官左天騎將軍十二人仙靈官右天騎將軍十二人仙靈官左太上都騎將軍十二人仙靈官右太上都騎將軍十二人仙靈官左玄上元將軍十二人仙靈官右玄上元將軍十二人仙靈官太一都將軍十二人仙靈官左天醫將軍十二人仙靈官右天醫將軍十二人仙靈官左三天九府將軍十二人仙靈官右三天九府將軍十二人仙靈官左上皇護騎將軍十二人仙靈官右上皇護騎將軍十二人仙靈官左剛風騎將軍十二人仙靈官右剛風騎將軍十二人仙靈官左玄曆旗將軍十二人仙靈官右玄曆旗將軍十二人仙靈官左上煞將軍十二人仙靈官右上煞將軍十二人仙靈官左陽神將軍十二人仙靈官右陽神將軍十二人仙靈官左隂神將軍十二人仙靈官右隂神將軍十二人仙靈官赤天罔使者十二人仙靈官赤天罔收氣使者十二人仙靈官紫宫度世使者十二人仙靈官清妙度世使者十二人仙靈官玄元度世使者十二人仙靈官天丁力士使者十二人仙靈官天騶甲卒十二人仙靈官天醫玄都使者十二人仙靈官九宫八極使者十二人仙靈官左天騎使者十二人仙靈官右天騎使者十二人仙靈官九宫玄上使者十二人仙靈官左玄上元使者十二人仙靈官右玄上元使者十二人仙靈官左赤狼使者十二人仙靈官右赤狼使者十二人仙靈官左清風使者十二人仙靈官右清風使者十二人仙靈官左朱雀使者十二人仙靈官右朱雀使者十二人仙靈官科車赤符使者十二人仙靈官科車赤符吏十二人仙靈官正一使者十二人仙靈官左天玄武使者十二人仙靈官右天玄武使者十二人仙靈官左上九天使者十二人仙靈官右上九天使者十二人仙靈官左三元四始使者十二人仙靈官右三元四始使者十二人仙靈官左走虎賁吏十二人仙靈官右走虎賁吏十二人緑冠黃服緑雲帔青緣緑冠紅服緑緣青披深青緣朱履太上正一九州社令籙品第八鎮真多治右領神氣祭酒屬水在漢州金堂縣應畢宿小滿四月中某法籙弟子某乙命屬北斗某星君今謹齎法信詣某法師門下奉受太上正一九州社令籙遣察行九州名山川澤五嶽四瀆五湖四海三十六國萬二千鄉亭里域周遍上下無極東西南北限召衆邪故氣萬鬼立到不得遷歷救治萬民千二百鬼注依法收籙萬神常在左右侍從延年益壽除凶度厄某乙受佩之後一如科約不得違背有違之日甘當冥考不敢有恨修行精誠即日聽署前部吏兵素被中治明道神君召詣臣拜受請給謹詞符召天帝兵馬急急如律令符召中央兵馬急急如律令符召中庭大神獄拯吏兵馬急急如律令符召南方兵馬急急如律令符召河伯君急急如律令符召太山二千石急急如律令符召山川黑神急急如律令符召社君急急如律令符召當路墓伯急急如律令符召當路君急急如律令符召中庭傷亡鬼急急如律令符召口舌鬼急急如律令符召社長急急如律令符召社令急急如律令符召太山真符召主斬急急如律令符召太山直符急急如律令符召尸鬼急急如律令符召社君收捕邪精鬼賊急急如律令符召斬鬼急急如律令符召井𡖖以行置井急急如律令符召門鬼以符置門急急如律令符召社公以符置社庭中急急如律令符召翟公里社急急如律令符召厭故無乙酉日水噴四角以封依領急急如律令符召河伯急急如律令符召東海神急急如律令符召社封虎穴以符封之急急如律令符召北方兵馬急急如律令符召東方兵馬急急如律令符召北方兵馬急急如律令度火厄度牢獄厄度厄度度大厄度病厄度小厄度歲厄度月厄度日厄度時厄度男子厄度生死厄度危亡厄度犯星厄度宅上厄度黃病厄度九宮厄度一切厄度本命厄度行年厄度考責厄度刀兵厄度魂魄厄度婦厄度氣厄度男女厄度枷鎖厄度産生厄度湯火厄度自縊厄符召八風使者急急如律令符召北方兵馬急急如律令符召太山君急急如律令符召太山二千石急急如律令符召白虎新鬼急急如律令符召廣灌神急急如律令符召東