body:
  text: 八卦護身籙品第十七炁應九月節其日角亢鎮雲臺治夏至後一百五日寒露考召籙品第十八炁應九月中其日氐鎮濜口治夏至後一百二十日霜降斬邪赤籙品籙第十九炁應十月節其日房鎮後城治夏至後一百三十五日立冬辟邪神籙品第二十炁應十月中其日心尾鎮公慕治夏至後一百五十日小雪四部禁炁籙品第二十一炁應十一月節其日箕鎮平罔治夏至後一百六十五日大雪斬河邪籙品第二十二炁應十一月中其日斗鎮主簿治夏至後一百八十日冬至功曹籙品第二十三炁應十二月節其日牛鎮玉局治冬至後一十五日小寒保命長生籙品第二十四炁應十二月中其日女鎮北邙治冬至後三十日大寒太上正一八卦護身籙第十七鎮雲臺治左監貢炁祭酒屬火在閬州蒼溪縣應角亢宿寒露九月節維某年某歲月朔日辰某州郡縣郷里某法籙弟子某乙本命某甲子某月日時生上屬北斗某星君今謹齎法信詣某法師門下奉受太上太一君皇天上帝无極太上元君太一元君玄元始炁八卦捍厄保命護身祕籙天帝生我皇天養我日月照我北斗輔我山川導我百神侍我隂陽通我風伯送我天厨供我紫雲蓋我神藥治我往來无窮入海則出天門入河即出地户司命舉我何求不得何指不測一食千歲連命日月與天地无窮登昇天機駕魁乘剛所指者亡身受太上帝君神符受者敢當皇天覆我龍虎使我朱雀導我玄武從我左陽從青龍右隂據白虎頭戴七星法應天斗司命留我年司録䕶我命疾病遠我官事離我盜賊避我羣星明我天炁利我地炁安我踰河渡海風浪不起虎狼見我摧牙折齒丹書九通辟除災凶白素爲符凶害滅除禹爲除道蚩尤避兵延年无極與天相畢急急如律令卷内符並朱書太上正一三五考召籙品第十八鎮濜口治右監貢炁祭酒屬金在興元府西縣應氐宿霜降九月中維某年某歲月朔日辰某州郡縣郷里某法籙弟子某乙本命某甲子某月日時生上屬北斗某星君今謹齎法信詣某法師門下奉受太清中宫三五將軍考召籙籙中吏兵請給醫治百姓助國扶命急急如律令上請東方召鬼大將軍一萬吏兵度上請南方召鬼大將軍一萬吏兵度上請西方召鬼大將軍一萬吏兵度上請北方召鬼大將軍一萬吏兵度上請上方召鬼大將軍一萬吏兵度上請下方召鬼大將軍一萬吏兵度上請召竈大將軍一萬吏兵度上請召七祖大將軍一萬吏兵度上請召宅大將軍一萬吏兵度上請召社大將軍一萬吏兵度上請召神大將軍八千吏兵度上請召青帝大將軍六千吏兵度上請召赤帝大將軍六千吏兵度上請召白帝大將軍六千吏兵度上請召黑帝大將軍六千吏兵度上請召黃帝大將軍六千吏兵度上請召左僕射大將軍六千吏兵度上請召右僕射大將軍六千吏兵度上請召活人大將軍二萬吏兵度上請召煞鬼大將軍二萬吏兵度上請召斬鬼大將軍二萬吏兵度上請召附水大將軍四千吏兵度上請召附城大將軍四千吏兵度上請召附鞭大將軍四千吏兵度太上正一斬邪赤籙品第十九鎮後城治左都炁祭酒屬水在漢州什邡縣應房宿立冬十月節某法籙弟子某乙命屬北斗某星君即日投道自實宿縁有幸得誕人道雖忝清化執行頑愚幽俗下賤自小及長常抱疾病淋瀝爲姦邪所淫初無健日今謹齎法信詣某法師門下請受太上正一天靈赤官斬邪大籙將軍吏兵營護某乙隨從行來出入住止辟斥衆邪收滅精魅黿鼉龜鼈狐狸老精千歲妖怪百歲孽王剛柔清濁山海高下妖魁巧僞六天故炁三䰟七𩲸安附身神依如老君律令天靈赤官斬邪直使功曹二人天靈赤官斬邪正一功曹二人天靈赤官斬邪治病功曹二人天靈赤官斬邪左官使者二人天靈赤官斬邪右官使者二人天靈赤官斬邪都使者二人天靈赤官斬邪陽神決吏二人天靈赤官斬邪隂神決吏二人天靈赤官斬邪陽官太醫二人天靈赤官斬邪隂神太醫二人天靈赤官攝邪將軍二人天靈赤官誅邪將軍二人天靈赤官伐邪將軍二人天靈赤官斬邪將軍二人天靈赤官治邪將軍二人天靈赤官截邪將軍二人天靈赤官斬邪陽神將軍二人天靈赤官斬邪隂神將軍二人天靈赤官護身將軍二人天靈赤官擒搏將軍二人天靈赤官斬邪衛身將軍二人天靈赤官監邪吏二人天靈赤官監邪直符二人天靈赤官斬邪使者二人天靈赤官斬邪正一使者二人天靈赤官斬邪御吏二人天靈赤官斬邪刺奸二人天靈赤官攝邪護身大神二人天靈赤官斬邪擒竒使者二人天靈赤官斬邪天醫扁鵲二人天靈赤官斬邪仙人道士玉女各二人天靈赤官青龍朱雀白虎玄武各二人天符有常教臣來北斗鬼神皆怖走保命延長青龍侍左白虎侍右朱雀導前玄武從後三十六仙人扶護左右使百二十神天符給用地符給粮出入東西南北與仙人同行攝神使者百二十人與驅使收攝百鬼南斗護命天符輔身仙人駕四龍遥詣天門太上護身急急如律令太上正一辟邪大籙品第二十鎮公慕治右都炁祭酒屬水在漢州什邡縣應心尾宿小雪十月中某法籙弟子某乙命屬北斗某星君素以胎生凡夫肉人百官子孫有幸建延考犯疾病何邪今於某年之中轉見進甚恐是邪精鬼魅不自分别今謹依科齎法物詣某法師門下求乞拜受太上正一辟邪大籙以自捕捉受符之日要當如法檢身斬絶不與邪鬼交通一如太上玄都法罪律令四獸依式裝符保某身諸衆邪故炁五酉鬼速去急去知汝名字急急如律令太上正一四部禁炁籙品第二十一鎮平冈治左貢炁祭酒屬水在蜀州新津縣應箕宿大雪十一月節某法籙弟子某乙命屬北斗某星君好道樂法嘗遊名山遍歷川澤志慕神仙今謹齎大刀一口命米一石二斗薪一束絳七尺五寸銀鐶一雙白素四十尺紙一百張墨一丸書刀一口眞珠一兩以爲誓信詣某法師門下求乞拜受太上正一太玄胡玄西玄壺公雜呪法四部禁炁籙却邪保生扶家助國佩受一如太上律令子禹步三前還王上吞十二炁丑禹步三前還王上吞十二炁寅禹步三刖還王上吞十二炁卯禹步三前還王上吞十二炁辰禹步三前還王上吞十二炁巳禹步三前還王上吞十二炁午禹步三刖還王上吞十二炁未禹步三前還王上吞十二炁申禹步三前還王上吞十二炁酉禹步三前還王上吞十二炁戌禹步三前還王上吞十二炁亥禹步三前還王上吞十二炁右十二時吞炁畢次思五方炁先思東方青炁次思南方赤炁次思西方白炁次思北方黑炁次思中央黄炁次思太歲上二十四炁先思今日上炁吞之次思今時上取炁吞之右思五方等炁畢次思五藏炁青炁歸肝中主青龍赤炁歸心中主朱雀白炁歸肺中主白虎黑炁歸腎中主玄武黄炁歸脾中主黄老君木數九火數八水數七金數六土數五禁倮蟲用木炁禁鱗蟲用金炁禁羽蟲用水炁禁毛蟲用火炁禁甲蟲用土炁右炁禁法皆如前次第某乙奉道精誠勤修禁戒至心專一請受禁炁神仙之法受者執刀長跪再拜發星法取炁步十二時從子起禹步左足前右足後呪之言敕湯火文又言敕路宿文又言敕自防身文又言敕臘文又言敕虵文又言敕惡鬼文又言敕社公毒文又言敕印文又言敕雲中鬼子文又言敕臃文又言敕都雜符文又言敕腫文又言敕獝文又言敕俗家房廟坐席文又言敕水鞭文又言敕蟲文又言敕師前病家文又言敕惡瘡文又言敕俗師文又言敕虎狼文又言敕食文又言敕按摩文又言敕他家竹塚文又言敕犬文又言敕針文又言敕度雜炁文又言敕禁樹文又言敕刀文又言敕虵虎瘡文又言敕蚊䖟文右合三十條牒度太玄胡玄壺公等禁炁雜決信物並備限右據某乙狀如前稱素胎生肉人流俗子孫千載有幸制屬太上諸君丈人道炁三師以相自保持前蒙師老賜著重籙治職得在師任以來未得明師口訣求請鯫生肉人口奏上天曹願典者罷塞故炁愍念羣生助賜星炁得明道法宣行有方救治有效道炁興王用法治病百鬼皆伏身中吏兵盡力傳行畢立神功遷轉名位凡所禁止依法施行又請通炁君十二人官將百二十人又請五方炁禁斷毒蟲虎狼等神將一合隨文度入某乙身中凡遇禁攝立使安寧急急如律令胡玄君姓高諱子嵩身長十丈赤冠五色之衣華蓋玉牀入鎮某乙身中右三玄君斗帳玉牀四角華蓋入鎮某乙身中東方青炁吏兵南方赤炁吏兵西方白炁吏兵北方黑炁吏兵中央黄炁吏兵東方青炁君南方赤炁君西方白炁君北方黑炁君中央黄炁君右五方眞炁君吏等度入某乙身中某乙好生樂法當遊名山四海令五方君吏驅逐邪炁天下地上一切毒蟲咸令攝伏急急如律令太上正一斬河邪籙品第二十二鎮主簿治右貢炁祭酒屬金邛州蒲江縣應斗宿冬至十一月中某法籙弟子某乙命屬北斗某星君素以胎生凡夫肉人專心樂道或施爲不法被㝠考所罰或疾病是何邪精魁作崇不自分别即日依科謹齎法信詣某法師門下求乞拜受太上正一斬河邪籙受佩之後永自輔身斷絶鬼崇不敢與鬼交通宣行正法救治百姓若違背科約之日坐見中傷不得怨道咎師一如太上老君律令太上正一三五功曹籙品第二十三鎮玉局治左察炁祭酒屬水在益州成都縣應牛宿小雪十二月節某法籙弟子某乙命屬北斗某星君今謹齎法信詣某法師門下求受太上正一三五功曹籙受佩之後要當扶助醫治百姓不得違背科約有違之日坐見中傷不得怨道咎師急急如太上老君律令太清甲官正一功曹千二百人泰清甲官治病功曹千二百人泰清甲官直使功曹千二百人泰清甲官五命功曹千二百人泰清甲官命神功曹千二百人絳服瑑皂履上靈官三五功曹一十五人上靈官正一功曹一十五人上靈官直使功曹一十五人上靈官治病功曹一十五人上靈官扶香使者一十五人絳服青縁皂履三五功曹五帝直符正一功曹直使功曹録曹符契三五功曹吏十二人五帝功曹吏十二人直使功曹吏十二人正一功曹吏十二人香官使者吏十二人絳服青眼皂履太上正一延生保命籙品第二十四鎮北邙治右察炁祭酒屬土在洛京洛陽縣應女宿大寒十二月中某乙命屬北斗某星君今謹齎法信詣某法師門下求受太上三五保命長生之籙後要當扶助醫治百姓不得違背科約有違之日坐見中傷不得怨道咎師急急如太上老君律令天靈官扶香使者三人天靈官扁鵲醫治三人天靈官除黑簿使者三人監度保舉度師太上三五正一盟威籙卷之六
