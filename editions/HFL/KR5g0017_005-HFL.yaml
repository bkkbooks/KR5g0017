body:
  text: 太上正一都章畢印籙品第十三炁應七月節其日星鎮北平治夏至後四十五日立秋太上正一斬邪華蓋籙品第十四炁應七月中其日張鎮本竹治夏至後六十日處暑太上正一九天兵符籙品第十五炁應八月節其日翼鎮蒙秦治夏至後七十五日白露太上正一九宫捍厄籙品第十六炁應八月中其日軫鎮平蓋治夏至後九十日秋分太上正一都章畢印籙品第十三鎮北平治左監察炁祭酒屬金在眉州彭山縣應星宿立秋七月節某法籙弟子某乙命屬北斗某星君今謹齎法信詣某法師門下奉受太上正一都章畢印籙千二百印章眞言要語長生之術二十四玉女等内以治身外以救人宣揚道教助國扶命醫治百姓拯救蒼生某受法之後誓不違科一旦背向異辭欺師妄道誹謗之愆某身謝天地水三官皆被風刀之考七祖引對急急如律令華蓋玉女二十四人摩鏡玉女二十四人清靈玉女二十四人治病玉女二十四人按摩玉女二十四人周城玉女二十四人揮印玉女二十四人印中玉女二十四人守印玉女二十四人著印玉女二十四人昇印玉女二十四人星藥玉女二十四人感藥玉女二十四人放藥玉女二十四人蓋藥玉女二十四人將藥玉女二十四人捉藥玉女二十四人行印玉女二十四人右一十八部用印玉女合四百三十二人度某乙身中上仙都促炁功曹十二人北斗君上仙都治病功曹十二人太一君上仙都天眞使者十二人天一君上仙都中部使者十二人三炁君上仙都正一功曹十二人南斗君上仙都直事使者功曹十二人華蓋君右六部功曹合七十二人度某乙身中甲子神將符木板從官百二十人甲戌神將呪丘明從官百二十人甲申神將鄧西嶽從官百二十人甲午神將扶天嶽從官百二十人甲辰神將孟非𡖖從官百二十人甲寅神將享于始從官百二十人甲戌玉女飛廉甲子玉女華翼甲午玉女素精甲申玉女素石甲寅玉女惠精甲辰玉女開朝藉丁丑玉女趙子玉丁卯玉女司馬𡖖丁酉玉女臧文公丁亥玉女張文通丁巳玉女崔巨𡖖丁未玉女石叔𡖖癸未玉女吕威明癸酉玉女孫仲房癸卯玉女蘇他家癸巳玉女史公來癸亥玉女左石松癸丑玉女江漢𡖖右六甲六丁六癸玉女度某乙身中太上正一斬邪華蓋籙品第十四鎮本竹治右監察炁祭酒屬水在蜀州新津縣應張宿處暑七月中某法籙弟子某乙命屬北斗某星君言被中皇直使司命无形君召本意志仙安魂定魄義在不死心和體正五宫六府道一所處元一飛神三五華蓋斬邪仙籙某以未佩有負先約科行有功今齎法信詣某法師門下請受太上正一斬邪華蓋籙籙中考邪鬼吏隨逐某身佩受之後不敢泄露要文一如前約律令直使功曹二人正一功曹二人治病功曹二人促炁功曹二人斬邪功曹二人收邪功曹二人録邪功曹二人捉邪功曹二人縛邪吏二人鞭邪吏二人科東赤符吏二人剛鳳騎置吏二人驛馬上章吏二人左將軍滅亡吏二人右將軍滅亡吏二人烏衣捕邪吏二人東方青雲收邪吏二人南方赤雲收邪吏二人西方白雲收邪吏二人北方黑雲收邪吏二人中央黄雲收邪吏二人誅邪吏二人破邪吏二人考邪吏二人東方甲乙青始車騎十萬人衣青衣服來屯某乙身中始生門南方丙丁赤玄車騎十萬人衣赤衣服來屯某乙身中防生門西方庚辛白玄車騎十萬人衣白衣服來屯某乙身中九生門北方壬癸黑玄車騎十萬人衣黑衣服來屯某乙身中養生門中央黄始司玄車騎十萬人衣黄衣服來屯某乙身中司命門太上正一九天兵符籙品第十五鎮蒙秦治左領功炁祭酒屬金在夔州臺登縣應翼宿白露八月節某法籙弟子某乙命屬北斗某星君今謹齎法信詣某法師門下求受太上正一九天兵符籙受佩一如律令謹給道門領理文書救治百姓專勤不易行合天中堪任加署謹齎五色綵詣臣求受九天兵符臣昔於某法師門下受符之日誓傳忠良今輒於太上御前加署九天兵主領太上天師千二百官君五方官屬輔助道門誅除凶逆血食符廟奸神僞鬼衆精故炁因及九年有功注名陽官請左神丞相號九天九地萬鬼中王昔出之時天光地赫萬神震動身長七十二丈廣七十二圍百二十印綬前後百二十鼓吹日夜十二時衛天帝君伺斬五方鬼衆精故炁以符召萬神千鬼俱滅急急如皇天大帝太上老君律令左滅亡君一十二人右滅亡君一十二人東方青領將軍九人青衣兵士八十一萬衆來屯左左滅亡君一十二人右滅亡君一十二人西方白領將軍七人白衣兵士四十九萬衆來屯右左滅亡君一十二人右滅亡君一十二人南方赤領將軍八人赤衣兵士六十四萬衆來屯前左滅亡君一十二人右滅亡君一十二人北方黑領將軍五人黑衣兵士二十五萬衆來屯後東方青始甲乙君車騎千人衣青各持泰始青炁來屯某乙始生門南方赤玄丙丁君車騎千人衣赤各持太初赤炁來屯某乙防生門西方白玄庚辛君車騎千人衣白各持太素白炁來屯某乙九生門北方黑玄壬癸君車騎千人衣黑各持太玄黑炁來屯某乙養生門中央司玄戊己君車騎千人衣黄各持太始黄炁來屯某乙司命門東方夷老君除逆部伏衛兵南方越老君扁鵲伏衛兵西方氐老君官死伏衛兵北方羌老君及甲錯鱗兵中央秦老君將領黄兵千二百官中央將軍身長二十四丈廣十二圍頭戴金幘冠百二十印綬天帝元始召九天符新出老君傳領民祭酒召九天五方鬼神一切降伏太上施虎賁兵三十萬衆主收天下熒惑逆鬼邪炁太上施天兵三十萬衆主收九天亂道逆鬼故炁太上發地兵四十萬衆主收破地上妄稱帝王不正逆鬼太上九天丈人兵四十萬衆主收散作无端百惡横行鬼太上營兵四十萬衆主收地上破壞治化五方不正鬼太上柱天兵四十萬衆主收食俗時粮血食爲災鬼太上青蓋兵四十萬人太上赤蓋兵四十萬人太上白蓋兵四十萬人太上黑蓋兵四十萬人太上黄蓋兵四十萬人東方青炁君兵百千萬重來屯某乙左邊南方赤炁君兵百千萬重來屯某乙右邊西方白炁君兵百千萬重來屯某乙前北方黑炁君兵百千萬重來屯某乙後中央黃炁君兵百千萬重來屯某乙身中以時傳度付某乙身中各保五方炁侯如所列下九兵符辟五方惡逆之鬼賊不正鬼炁所在里域速令一切伏滅急急如太上老君律令左无上柱天兵四十萬人主收大惑鬼右无上五種三十萬人主收新來鬼左无上中宫五營兵三十萬人主收大逆鬼右无上域門兵三十萬人主收不道鬼左无上中大兵三十萬人主收精邪鬼右无上九元中野兵三十萬人主收千正鬼左无上領天兵三十萬人主收北元逆鬼右无上七部官將主收天地水三官五方不正神姦詐恐動治民者玄老玄留大將軍十萬人玄老周天大將軍十萬人玄老中玄大將軍十萬人玄老五元大將軍十萬人玄老蓋天大將軍十萬人玄老九天大將軍十萬人玄老中律大將軍十萬人玄老建玄大將軍十萬人玄老還天大將軍十萬人玄老中域大將軍十萬人玄老中微大將軍十萬人玄老中庭大將軍十萬人玄老九天丈人兵十萬人主收亡女稱師教者治之太上西域兵四十萬人主收新出逆鬼太上宫門大兵四十萬人主收新斬大逆鬼太上南溪兵四十萬人主收百二十作城天皇鬼太上營門兵四十萬人主收角抵鬼太上發地兵四十萬人主收天皇鬼太上督天兵四十萬人主收自稱帝鬼太上前受大兵四十萬人主收社竈鬼太上北方三秦兵四十萬人主收客死鬼太上越天大將軍四十萬人太上正天大將軍四十萬人太上九道大將軍四十萬人太上九誅大將軍四十萬人太上九剛大將軍四十萬人太上營門大將軍四十萬人太上玉蓋大將軍四十萬人太上青蓋大將軍四十萬人太上赤蓋大將軍四十萬人太上白蓋大將軍四十萬人太上黑蓋大將軍四十萬人太上黄蓋大將軍四十萬人太上宫門大將軍四十萬人太上二十三部官將主收小官自稱威神制却治官及將軍民妄設風波傷殺百姓人民俗不得别署收捕考校此左无上有玄老太上三五官將度内官一百二十人所用水官度治太上正一九宮捍厄籙品第十六鎮平蓋治右領功炁祭酒屬土在蜀州新津縣應軫宿秋分八月中某法籙弟子某乙好道樂法太上子孫命屬神仙玉曆北斗七星君今謹齎法信詣某法師門下拜受太上正一九宫捍厄籙願某住世身得保度九厄解脫萬惡消亡周行天下早遇神仙延年益壽諸災伏匿如臣之願佩受一如玄科律令圖内天尊並取宜裝太上三五正一盟威籙卷之五
