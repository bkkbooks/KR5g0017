body:
  text: 太上正一童子一將軍籙品第一氣應正月節其日在虛鎮陽平治冬至後四十五日立春太上正一童子十將軍籙品第二氣應正月中其日在危鎮鹿堂治冬至後六十日雨水太上正一一百五十將軍籙品第三氣應二月節其日在室壁鎮鶴鳴治冬至後七十五日驚蟄太上正一三將軍籙品第四氣應二月中其日在奎鎮漓沅治冬至後九十日春分太上正一童子一將軍籙品第一鎮陽平治左平氣祭酒屬金在彭州九隴縣惠虛宿立春正月節維某年某歲月朔日辰某州郡縣鄉里某乙本命某某月日時生上屬北斗某星君言被五氣神童君召某乙素以胎生肉人宿緣有韋得遇大道謹齎法信詣某名山某宫觀投某法師門下拜受太上正一童子一將軍籙籙中真吏受佩之後一如科法修行請給謹狀上仙都直使功曹一人上仙都正一功曹一人上仙都治病功曹一人上仙都左官使者一人上仙都陽神決吏一人上仙都狼吏虎賁各十二人上仙都察姦鉤騎各十二人上仙都三官僕射各十二人上仙都天騶甲卒各十二人上仙都天丁力士各十二人上仙都收氣食氣吏十二人卷內符圖並朱書神將金甲青帶上靈官直使功曹一人上靈官正一功曹一人上靈官治病功曹一人上靈官左官使者一人上靈官陽神決吏一人上靈官狼吏虎賁各十二人上靈官察姦鉤騎十二人上靈官三官僕射十二人上靈官天騶甲卒十二人上靈官天丁力士十二人上靈官收氣食氣吏十二人金甲緑帶太上正一童子十將軍籙品第二鎮鹿堂治右平氣祭酒屬水在漢州綿竹縣應危宿雨水正月中某法籙弟子某乙命屬北斗某星君夙被五氣神童君召謹齎香信詣某法師門下拜受太上正一童子十將軍籙一如科約律令上仙都直使功曹一人上仙都正一功曹一人上仙都治病功曹一人上仙都左官使者一人上仙都陽神決吏一人上仙都治病陽官太翳吏二人赤天曆旗剛風騎將軍二人赤天曆旗剛風左騎將軍二人赤天曆旗剛風右騎將軍二人赤天曆旗剛風將軍二人赤天曆旗剛風左將軍二人赤天曆旗剛風右將軍二人上仙都狼吏虎賁二百四十人上仙都察姧鈎騎二百四十人上仙都三官僕射二百四十人上仙都天騶甲卒二百四十人上仙都天丁力士二百四十人上仙都收氣食氣吏二百四十人上仙都科車赤符吏二百四十人上仙都剛風騎置驛馬上章吏各二人上靈官直使功曹二人上靈官正一功曹二人上靈官治病功曹二人上靈官左官使者二人上靈官陽神決吏二人上靈官治病陽官太翳二人上靈官中都騎將軍二人上靈官中都左騎將軍二人上靈官中都右騎將軍二人上靈官中都將軍二人上靈官中都左將軍二人上靈官中都右將軍二人上靈官狼吏虎賁二百四十人上靈官察姦鉤騎二百四十人上靈官三官僕射二百四十人上靈官天騶甲卒三百四十人上靈官天丁力士二百四十人上靈官收氣食氣吏二百四十人上靈官科車赤符吏二百四十人上靈官剛風騎置驛馬上章吏二人上正一上仙百五十將軍籙品第三鎮鶴鳴治左長氣祭酒屬金在邛州大邑縣應室壁二宿驚蟄二月節某法籙弟子某乙命屬北斗某星君奉法以來專勤不替在道日新領太上高皇帝王神氣不能自分别詣臣自實悉言被無下九老北中狄君召即日聽署修行有功求受太上正一上仙百五十將軍籙要當扶助一依科約不敢有違請給謹詞上仙都直使功曹十五人上仙都正一功曹十五人上仙都治病功曹十五人上仙都左官功曹十五人上仙都右官功曹十五人上仙都陽神決吏十五人上仙都陽神治病功曹十五人上仙都隂神決吏十五人上仙都隂神治病功曹十五人上仙都治病陽官太醫吏十五人上仙都治病隂官太醫吏十五人赤天曆旗剛風將軍五人赤天曆旗剛風左將軍五人赤天曆旗剛風右將軍五人赤天曆旗剛風中官大將軍五人赤天曆旗剛風中宫左將軍五人赤天曆旗剛風中宫右將軍五人赤天曆旗剛風大驛將軍五人赤天曆旗剛風都驛將軍五人赤天曆旗剛風左驛將軍五人赤天曆旗剛風右驛將軍五人赤天曆旗左剛風官騎將軍五人赤天曆旗右剛風官騎將軍五人赤天曆旗剛風左騎將軍五人赤天曆旗剛風右騎將軍五人上仙都郎吏虎賁千二百人上仙都察姧鉤騎千二百人上仙都三官僕射千二百人上仙都天騶甲卒千二百人上仙都天丁力士千二百人上仙都收氣食氣吏六十人上仙都收神食神吏六十人上仙都收鬼食鬼吏六十人上仙都收邪食邪吏六十人上仙都收毒食毒吏六十人上仙都收凶食凶吏六十人上仙都收精食精吏六十人上仙都收瘟食瘟吏六十人上仙都科車赤符吏六十人上仙都剛風騎置驛馬上章吏二人上靈官直使功曹十五人上靈官正一功曹十五人上靈官治病功曹十五人上靈官左官使者十五人上靈官右官使者十五人上靈官陽神決吏十五人上靈官隂神決吏十五人上靈官陽官治病功曹十五人上靈官隂官治病功曹十五人上靈官治病陽官太醫吏十五人上靈官治病隂官太醫吏十五人上靈官驛騎將軍五人上靈官左驛騎將軍五人上靈官右驛騎將軍五人上靈官都官驛騎將軍五人上靈官左都官驛騎將軍五人上靈官右都官驛騎將軍五人上靈官都官將軍五人上靈官左都官將軍五人上靈官右都官將軍五人上靈官都督將軍五人上靈官左都督將軍五人上靈官右都督將軍五人上靈官中騎將軍五人上靈官中騎左將軍五人上靈官中騎右將軍五人上靈官狼吏虎賁千二百人上靈官察娃鉤騎千二百人上靈官都官僕射千二百人上靈官天騶甲卒千二百人上靈官天丁力士千二百人上靈官收氣食氣吏六十人上靈官收神食神吏六十人上靈官收鬼食鬼吏