body:
  text: 太上正一星綱五斗籙品第九氣應五月節其日觜參鎮昌利治冬至後一百六十五日芒種太上正一河圖保命籙品第十氣應五月中其日井鎮隸上治冬至後一百八十日夏至太上正一解六害神虎籙品第十一氣應六月節其日鬼鎮湧泉治夏至後一十五日小暑太上正一九鳳破穢籙品第十二氣應六月中其日柳鎮稠粳治夏至後三十日大暑太上正一星綱五斗籙品第九鎮吕利治左都監氣祭酒屬土在懷安軍金堂縣應觜參二宿芒種五月節維某年某歲月朔日辰某州郡縣鄉里某法籙弟子某乙本命某某月日時生上屬北斗某星君言被元始三氣君召今謹齎法信詣某名山宫觀太上御前投某法師門下求受太上正一星綱五斗籙即日聽署校五百里步綱拜受一如赤籙律令上元將軍姓唐名掠長九十萬丈中元將軍姓李名昌長七十萬丈下元將軍姓徐名宗長五十萬丈上元三五代神功曹姓華名宏領兵千萬人中元三五伐神功曹姓田名同福領兵千萬人下元三五伐神功曹姓溫名仲舒領兵千萬人東斗功曹一十五人南斗功曹一十五人西斗功曹一十五人北斗功曹一十五人中斗功曹一十五人歲星功曹一十五人熒惑功曹一十五人辰星功曹一十五人鎮星功曹一十五人太白功曹一十五人生氣功曹一十五人三五九星功曹一十五人真人先生功曹一十五人三五九姓功曹一十五人九天七星功曹一十五人九氣中元功曹一十五人金伐童子一千二百人開綱童子一千二百人僮天僮地一千二百人三五童子一千二百人平元力士一千二百人五斗小吏一千二百人卷內符圖並朱書太上正一河圖保命籙品第十鎮隸上治右都監氣祭酒屬土在漢州德陽縣應井宿夏至五月中某法籙弟子某乙命屬北斗某星君即日謹齎法信奉詣某法師門下拜受太上正一河圖保命籙中宮八海三河要訣河圖祕篆籙中將軍三百二十萬人營護某乙身形保身護命長生延年消災解厄涉歷河海龍王保守風波靜息急急如太上老君律令玄老玄留大將軍十萬人玄老通天大將軍十萬人玄老周天大將軍十萬人玄老建天大將軍十萬人玄老中玄大將軍十萬人玄老中誠大將軍十萬人玄老中𩲸大將軍十萬人玄老前效大將軍十萬人玄老蓋天大將軍十萬人玄老五桑大將軍十萬人玄老車中大將軍十萬人玄老越天大將軍十萬人玄老五蓋大將軍十萬人玄老靈天大將軍十萬人太上九開大將軍十萬人太上中邪大將軍十萬人太上黃蓋大將軍十萬人太上校虎大將軍十萬人太上五誅大將軍十萬人太上修天大將軍十萬人太上北部大將軍十萬人太上中越大將軍十萬人太上太營大將軍十萬人太上九氣大將軍十萬人太上南方赤鎮大將軍十萬人太上北方黑鎮大將軍十萬人太上東方青鎮大將軍十萬人太上中央黃鎮大將軍十萬人太上西方白鎮大將軍十萬人太上中建大將軍十萬人太上青蓋大將軍十萬人太上左右二將軍十萬人右合三十二部大將軍天兵隨逐某乙身中扶護急急如律令太上正一解六害神符籙品第十一鎮涌泉治左監神氣祭酒屬水在漢州德陽縣應鬼宿小暑六月節某法籙弟子某乙命屬北斗某星君今謹齎法信詣某法師門下拜受太上太一君無極太上元一君無極解六害祕籙天帝所生皇天養我皇地載我日月照我北斗輔我山川通我萬靈祐我百神侍我隂陽扶我風伯送我紫雲蓋我神藥治我往來無極入海出天門入河出地户司命與我天厨飴我何求不得何指不測一食千歲連命日月與天無窮與地無極登升天機駕魁乘罔所向者伏所指者亡我受太上天帝教令誰敢有當龍虎扶我朱雀導我玄武從我左陽青龍右隂白虎頭戴七星法應天斗司命留我司録護我疾病離我盜賊避我所求皆得所厭皆伏踰河渡海風浪不起虎狼見我摧牙折齒丹書為符凶咎滅亡禹為除道蚩尤避兵天符地節前開後閉延年無極與天同畢急急如律令太上正一九鳳破穢籙品第十二鎮稠粳治右監神氣祭酒屬水在蜀州新津縣應柳宿大暑六月中某法籙弟子某乙命屬北斗某星君今謹齎法信詣某法師門下請受太上正一九鳳破穢籙受佩一如律令謹請東西南北解穢神君主消淹穢之厄延年益命辟邪除凶保定魄魂聰明耳目禳災度厄安附身神急急如律令謹請破穢君五人官將百二十人謹請却穢君五人官將百二十人謹請滅穢君五人官將百二十人謹請蕩穢君五人官將百二十人謹請除穢君五人官將百二十人謹請收穢君五人官將百二十人謹請運穢君五人官將百二十人謹請解穢君五人官將百二十人謹請洗穢君五人官將百二十人謹請斬穢君五人官將百二十人太上正一盟威籙卷之四
